# ──────────────────────────────────────────────────────────────────────────
# seo-agent/docker-compose.yml
# ONLY the SEO agent's own containers: frontend + backend.
# Joins the EXTERNAL shared-network created by shared/docker-compose.yml.
# Never define postgres/redis/nginx here. Never add ports: (nginx routes).
# ──────────────────────────────────────────────────────────────────────────
services:
  frontend:
    build: ./frontend
    image: localhost/seo-frontend:latest
    pull_policy: never
    container_name: seo-frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_BASE=http://10.3.5.99/seo/api
    networks:
      - shared-network

  backend:
    build: ./backend
    image: localhost/seo-backend:latest
    pull_policy: never
    container_name: seo-backend
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@shared-postgres:5432/seo_db
      REDIS_URL: redis://shared-redis:6379
    # NOTE: no depends_on for shared-postgres/shared-redis — they live in
    # shared/docker-compose.yml, so they can't be referenced here. Startup
    # order is enforced by shared/scripts/start-all.sh (shared stack first).
    networks:
      - shared-network

networks:
  shared-network:
    external: true

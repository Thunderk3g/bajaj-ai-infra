# ──────────────────────────────────────────────────────────────────────────
# shared/nginx.conf
# Single server on :80 routing ALL agents by path.
# This file replaces the container's /etc/nginx/nginx.conf entirely,
# so it must be a COMPLETE nginx config (events + http blocks).
#
# add-agent-route.sh edits the marked regions below. Keep the marker
# comments intact or the script will not know where to insert.
# ──────────────────────────────────────────────────────────────────────────
user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # ── UPSTREAMS ─────────────────────────────────────────────────────────
    # BEGIN UPSTREAMS

    # Compliance Agent
    upstream compliance_frontend { server compliance-frontend:3000; }
    upstream compliance_backend  { server compliance-backend:8000;  }

    # SEO Agent
    upstream seo_frontend { server seo-frontend:3002; }
    upstream seo_backend  { server seo-backend:8001;  }

    # END UPSTREAMS
    # ──────────────────────────────────────────────────────────────────────

    server {
        listen 80;

        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # ── LOCATIONS ─────────────────────────────────────────────────────
        # BEGIN LOCATIONS

        # Compliance Agent
        location /compliance/ {
            proxy_pass http://compliance_frontend/;
            include /etc/nginx/proxy_params.conf;
        }
        location /compliance/api/ {
            proxy_pass http://compliance_backend/;
            include /etc/nginx/proxy_params.conf;
        }

        # SEO Agent
        location /seo/ {
            proxy_pass http://seo_frontend/;
            include /etc/nginx/proxy_params.conf;
        }
        location /seo/api/ {
            proxy_pass http://seo_backend/;
            include /etc/nginx/proxy_params.conf;
        }

        # END LOCATIONS
        # ──────────────────────────────────────────────────────────────────

        # ── ADD NEW AGENT MANUALLY (or use add-agent-route.sh) ─────────────
        # upstream <agentname>_frontend { server <agentname>-frontend:PORT; }
        # upstream <agentname>_backend  { server <agentname>-backend:PORT;  }
        # location /<agentname>/ {
        #   proxy_pass http://<agentname>_frontend/;
        #   include /etc/nginx/proxy_params.conf;
        # }
        # location /<agentname>/api/ {
        #   proxy_pass http://<agentname>_backend/;
        #   include /etc/nginx/proxy_params.conf;
        # }
        # ───────────────────────────────────────────────────────────────────
    }
}

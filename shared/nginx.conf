# ──────────────────────────────────────────────────────────────────────────
# shared/nginx.conf
# Single server on :80 routing ALL agents by path.
# This file replaces the container's /etc/nginx/nginx.conf entirely,
# so it must be a COMPLETE nginx config (events + http blocks).
#
# RESILIENT ROUTING: agent hostnames are resolved lazily at request time
# (via `resolver` + a variable in proxy_pass). This means a DOWN agent only
# returns 502 for its own path — it no longer aborts nginx startup and takes
# the whole platform (and pgAdmin) down with it.
#
# add-agent-route.sh edits the marked regions below. Keep the marker
# comments intact or the script will not know where to insert.
# ──────────────────────────────────────────────────────────────────────────
user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;

        # Podman/aardvark embedded DNS. Required so the variable-based
        # proxy_pass directives below resolve agent names at request time.
        resolver 10.89.0.1 valid=10s ipv6=off;

        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # ── LOCATIONS ─────────────────────────────────────────────────────
        # BEGIN LOCATIONS

        # Compliance Agent
        # (api/ first — nginx longest-prefix match handles ordering anyway)
        location /compliance/api/ {
            set $compliance_backend http://compliance-backend:8000;
            rewrite ^/compliance/api/(.*)$ /$1 break;
            proxy_pass $compliance_backend;
            include /etc/nginx/proxy_params.conf;
        }
        # Next.js: basePath=/compliance, trailingSlash=false. It serves the
        # index at the BARE /compliance (200) and 308-redirects /compliance/
        # -> /compliance. So the canonical URL has NO trailing slash.
        #
        # Two blocks are required, and the order/type matters:
        #   * `location = /compliance` (EXACT) — a bare prefix `location
        #     /compliance` makes nginx 301-redirect /compliance -> /compliance/,
        #     which then 308s back to /compliance => infinite redirect loop.
        #     An exact match is terminal and does NOT auto-append the slash, so
        #     the bare path is proxied straight through (Next answers 200).
        #   * `location /compliance/` (PREFIX) — serves /compliance/_next/...,
        #     and the /compliance/ -> /compliance 308 is emitted by Next, not us.
        # /compliance/api/ still wins over /compliance/ by longest-prefix match.
        #
        # Do NOT rewrite the prefix away (unlike the api/ block, where FastAPI
        # listens at root): with variable proxy_pass + no URI part, nginx
        # forwards $uri unchanged, which is exactly what basePath expects.
        location = /compliance {
            set $compliance_frontend http://compliance-frontend:3000;
            proxy_pass $compliance_frontend;
            include /etc/nginx/proxy_params.conf;
        }
        location /compliance/ {
            set $compliance_frontend http://compliance-frontend:3000;
            proxy_pass $compliance_frontend;
            include /etc/nginx/proxy_params.conf;
        }

        # SEO Agent — removed for now (agent not deployed). Re-add when it ships.

        # END LOCATIONS
        # ──────────────────────────────────────────────────────────────────

        # pgAdmin — DB browser for shared-postgres. http://<host>/pgadmin/
        location /pgadmin/ {
            set $pgadmin http://shared-pgadmin:5050;
            rewrite ^/pgadmin/(.*)$ /$1 break;
            proxy_set_header X-Script-Name /pgadmin;
            proxy_pass $pgadmin;
            include /etc/nginx/proxy_params.conf;
        }

        # ── ADD NEW AGENT MANUALLY (or use add-agent-route.sh) ─────────────
        # NOTE: `set` MUST come before `rewrite ... break` — break halts the
        # rewrite phase, and `set` is a rewrite-phase directive, so a `set`
        # placed after it never runs (=> "uninitialized variable").
        # location /<agentname>/api/ {
        #   set $<agentname>_backend http://<agentname>-backend:PORT;
        #   rewrite ^/<agentname>/api/(.*)$ /$1 break;
        #   proxy_pass $<agentname>_backend;
        #   include /etc/nginx/proxy_params.conf;
        # }
        # location /<agentname>/ {
        #   set $<agentname>_frontend http://<agentname>-frontend:PORT;
        #   rewrite ^/<agentname>/(.*)$ /$1 break;
        #   proxy_pass $<agentname>_frontend;
        #   include /etc/nginx/proxy_params.conf;
        # }
        # ───────────────────────────────────────────────────────────────────
    }
}
